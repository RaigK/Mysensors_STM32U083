[platformio]
# Dieser Ordner MUSS die Datei nucleo_u083rc.json enthalten!
boards_dir = boards
default_envs = stm32u083

[env:stm32u083]
platform = ststm32
board = stm32u083rc
framework = arduino

# Die Pakete müssen präzise definiert sein, um den neuen U0-Chip zu unterstützen
platform_packages =
    framework-arduinoststm32@https://github.com/stm32duino/Arduino_Core_STM32.git#main
    tool-openocd@~3.1200.0

# Debug-Einstellungen
upload_protocol = stlink
upload_command = "C:/Program Files/STMicroelectronics/STM32Cube/STM32CubeProgrammer/bin/STM32_Programmer_CLI.exe" -c port=SWD mode=UR freq=480 -w "$SOURCE" 0x08000000 -v -rst
debug_tool = stlink
board_debug.openocd_target = stm32u0x

# Serial Monitor
monitor_speed = 115200
monitor_port = COM9

# Bibliotheken
lib_deps =
    https://github.com/mysensors/MySensors.git#development
    stm32duino/STM32duino RTC@^1.4.0
    closedcube/ClosedCube HDC1080@^1.3.2

# Keep the bare-metal cube env's vendored HAL and Arduino shim out of this
# Arduino build — STM32duino already provides both the HAL and Arduino API,
# and loading STM32CubeU0 here causes HAL macro redefinition conflicts.
lib_ignore = STM32CubeU0, arduino_compat

# Build Flags (Deine spezifischen Fixes für den U083)
build_flags =
    -I include
    -I lib/MySensors_patch
    -D ARDUINO_ARCH_STM32
    -D ARDUINO_NUCLEO_U083RC
    -D STM32U0xx
    -D STM32U083xx
    -D MY_STM32_RUN_MODE=2
    -D MY_STM32_SLEEP_MODE=3
    -D RTC_ISR_INITS=RTC_ICSR_INITS
    -D RTC_WKUP_IRQn=RTC_TAMP_IRQn
    -D PIN_SPI_SCK=PA5
    -D PIN_SPI_MISO=PA6
    -D PIN_SPI_MOSI=PA7
    -include "include/stm32_aes_fix.h"

# ----------------------------------------------------------------------------
# Bare-metal CubeU0 environment (cubeu0-port branch).
# No Arduino, no STM32duino. Pure STM32CubeU0 HAL vendored under lib/STM32CubeU0.
# Build with: pio run -e stm32u083_cube
# ----------------------------------------------------------------------------
[env:stm32u083_cube]
platform = ststm32
board = stm32u083rc

platform_packages =
    tool-openocd@~3.1200.0

upload_protocol = stlink
upload_command = "C:/Program Files/STMicroelectronics/STM32Cube/STM32CubeProgrammer/bin/STM32_Programmer_CLI.exe" -c port=SWD mode=UR freq=480 -w "$SOURCE" 0x08000000 -v -rst
debug_tool = stlink
board_debug.openocd_target = stm32u0x

monitor_speed = 115200
monitor_port = COM9

board_build.ldscript = ldscripts/STM32U083xx_FLASH.ld

lib_compat_mode = off
lib_deps =
    https://github.com/mysensors/MySensors.git#development
    closedcube/ClosedCube HDC1080@^1.3.2
lib_ignore = STM32duino RTC

build_flags =
    -D STM32U0xx
    -D STM32U083xx
    -D USE_HAL_DRIVER
    -D ARDUINO_ARCH_STM32
    -D MY_STM32_RUN_MODE=2
    -D MY_STM32_SLEEP_MODE=3
    -D RTC_ISR_INITS=RTC_ICSR_INITS
    -D RTC_WKUP_IRQn=RTC_TAMP_IRQn
    -mcpu=cortex-m0plus
    -mthumb
    -mfloat-abi=soft
    -Wl,--gc-sections
    -ffunction-sections
    -fdata-sections
    -nostartfiles
    --specs=nano.specs
    --specs=nosys.specs
    -Wl,--wrap=HAL_PWR_EnterSTOPMode
    -Wl,-u,_sbrk
    -Wl,-u,_write
    -Wl,-u,_read
    -Wl,-u,_close
    -Wl,-u,_lseek
    -Wl,-u,_fstat
    -Wl,-u,_isatty
    -Wl,-u,_getpid
    -Wl,-u,_kill
    -Wl,-u,_exit
    -I include
    -include "include/stm32_aes_fix.h"

build_src_filter =
    -<*>
    +<main.cpp>